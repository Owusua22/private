name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build EXE
        run: npm run dist
      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: PrivateApp-EXE
          path: dist/